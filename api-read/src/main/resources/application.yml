spring:
  application:
    name: api-read
  threads:
    virtual:
      enabled: true   # Java 21 virtual threads
  cache:
    type: redis
    redis:
      time-to-live: 60000   # 60s TTL for cached products
  data:
    redis:
      timeout: 500ms
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  newrelic:
    metrics:
      export:
        api-key: ${NEW_RELIC_API_KEY:unset}
        account-id: ${NEW_RELIC_ACCOUNT_ID:unset}
        step: 30s

server:
  port: 8080
  shutdown: graceful

resilience4j:
  circuitbreaker:
    instances:
      productService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
