# HPA — scales api-rw 2–8 replicas on CPU.
# 3% of 200k rpm = ~6k req/min inventory operations.
# api-rw is CPU-heavier per request (Redisson lock + DB FOR UPDATE).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-rw
  namespace: platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-rw
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65       # lower threshold — lock contention is sensitive
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
