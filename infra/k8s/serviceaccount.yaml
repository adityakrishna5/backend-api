# Workload Identity — each service gets its own KSA bound to a GCP service account.
# GCP SA needs:  roles/cloudsql.client   (Cloud SQL Auth Proxy)
#                roles/monitoring.metricWriter  (New Relic / Cloud Monitoring)
#
# One-time IAM binding per service (replace PROJECT_ID):
#   gcloud iam service-accounts create store-api-read \
#     --project=PROJECT_ID
#   gcloud projects add-iam-policy-binding PROJECT_ID \
#     --member="serviceAccount:store-api-read@PROJECT_ID.iam.gserviceaccount.com" \
#     --role="roles/cloudsql.client"
#   gcloud iam service-accounts add-iam-policy-binding \
#     store-api-read@PROJECT_ID.iam.gserviceaccount.com \
#     --role="roles/iam.workloadIdentityUser" \
#     --member="serviceAccount:PROJECT_ID.svc.id.goog[platform/store-api-read]"
# Repeat for store-api-write and store-api-rw.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: store-api-read
  namespace: platform
  annotations:
    iam.gke.io/gcp-service-account: store-api-read@YOUR_PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: store-api-write
  namespace: platform
  annotations:
    iam.gke.io/gcp-service-account: store-api-write@YOUR_PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: store-api-rw
  namespace: platform
  annotations:
    iam.gke.io/gcp-service-account: store-api-rw@YOUR_PROJECT_ID.iam.gserviceaccount.com
