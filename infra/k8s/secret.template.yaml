# secret.template.yaml — DO NOT commit real values. Base64-encode each value:
#   echo -n 'actual-value' | base64
#
# After filling in real values, create the secret once:
#   kubectl apply -f infra/k8s/secret.yaml -n platform
#
# For production prefer External Secrets Operator backed by GCP Secret Manager.
apiVersion: v1
kind: Secret
metadata:
  name: store-secrets
  namespace: platform
type: Opaque
data:
  # Cloud SQL IAM user (base64)
  DB_USER: <base64-encoded-db-user>

  # Cloud SQL IAM password (base64) — or leave empty if using Workload Identity only
  DB_PASSWORD: <base64-encoded-db-password>

  # New Relic ingest key (base64)
  NEW_RELIC_API_KEY: <base64-encoded-nr-api-key>

  # New Relic account ID (base64)
  NEW_RELIC_ACCOUNT_ID: <base64-encoded-nr-account-id>
