# HPA — scales api-read 2–20 replicas on CPU.
# At 200k rpm and ~85% read traffic (~170k req/min), each pod handles ~8500 req/min
# at a comfortable CPU target, giving roughly 20 pods under steady-state peak.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-read
  namespace: platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-read
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # slow scale-down to avoid thrashing
