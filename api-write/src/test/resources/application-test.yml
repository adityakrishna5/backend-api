spring:
  datasource:
    url: jdbc:h2:mem:ordertest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  kafka:
    bootstrap-servers: localhost:9092   # overridden by @EmbeddedKafka in consumer tests
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/store-realm

management:
  newrelic:
    metrics:
      export:
        enabled: false
